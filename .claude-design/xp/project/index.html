<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>XP — Life OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" />
<style>
  :root {
    /* Catppuccin Mocha */
    --base: #1e1e2e;
    --mantle: #181825;
    --crust: #11111b;
    --surface0: #313244;
    --surface1: #45475a;
    --surface2: #585b70;
    --overlay0: #6c7086;
    --overlay1: #7f849c;
    --overlay2: #9399b2;
    --text: #cdd6f4;
    --subtext1: #a6adc8;
    --subtext0: #bac2de;
    --accent: #cba6f7;   /* purple */
    --red: #f38ba8;
    --green: #a6e3a1;
    --yellow: #f9e2af;
    --orange: #fab387;
    --blue: #89b4fa;
    --pink: #f5c2e7;
    --teal: #94e2d5;

    /* node colors */
    --c-domain: #89b4fa;
    --c-skill: #a6e3a1;
    --c-project: #fab387;
    --c-task: #9399b2;
    --c-person: #f5c2e7;
    --c-tag: #f9e2af;
    --c-routine: #94e2d5;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--base);
    color: var(--text);
    font-family: "Inter", -apple-system, system-ui, sans-serif;
    font-size: 14px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
  }
  #root { height: 100vh; }
  .mono { font-family: "JetBrains Mono", ui-monospace, monospace; }

  /* scrollbars */
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--surface1); border-radius: 6px; border: 2px solid var(--base); }
  ::-webkit-scrollbar-thumb:hover { background: var(--surface2); }

  /* focus ring */
  :focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; border-radius: 4px; }

  button { font-family: inherit; cursor: pointer; }

  /* keyframes */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(4px); } to { opacity: 1; transform: none; } }
  @keyframes slideRight { from { transform: translateX(20px); opacity: 0; } to { transform: none; opacity: 1; } }
  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  @keyframes pop { 0% { transform: scale(0.92); } 50% { transform: scale(1.04); } 100% { transform: scale(1); } }

  .fade-in { animation: fadeIn 200ms ease both; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
